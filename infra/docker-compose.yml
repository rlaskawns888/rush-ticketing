version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: rush-postgres
    environment:
      POSTGRES_USER: rush
      POSTGRES_PASSWORD: rush1234
      POSTGRES_DB: rush_ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rush -d rush_ticketing"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: rush-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: